<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 280" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="mist-overlay" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#E6CEA7" stop-opacity="0"/>
      <stop offset="60%" stop-color="#E6CEA7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F0E4C7" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- 最遠景: 灰青で霞む稜線 -->
  <path
    d="M 0 170 L 130 130 L 280 160 L 430 105 L 590 145 L 750 115 L 910 150 L 1080 110 L 1240 145 L 1410 125 L 1570 155 L 1720 130 L 1870 150 L 1920 140 L 1920 280 L 0 280 Z"
    fill="#7C8A8A"
    opacity="0.30"
  />

  <!-- 中景: 青墨の力強い稜線 -->
  <path
    d="M 0 220 L 110 175 L 250 215 L 410 155 L 560 200 L 730 150 L 890 195 L 1060 160 L 1240 205 L 1410 170 L 1580 215 L 1740 175 L 1890 210 L 1920 200 L 1920 280 L 0 280 Z"
    fill="#2D3E3A"
    opacity="0.55"
  />

  <!-- 近景の脇道: 松葉色の凹凸 -->
  <path
    d="M 0 250 L 140 220 L 280 245 L 440 210 L 600 240 L 770 215 L 940 245 L 1110 220 L 1280 248 L 1450 215 L 1620 245 L 1790 220 L 1920 240 L 1920 280 L 0 280 Z"
    fill="#3F5F40"
    opacity="0.45"
  />

  <!-- 山の裾に流れる金茶の霞 -->
  <rect x="0" y="160" width="1920" height="120" fill="url(#mist-overlay)"/>
</svg>
