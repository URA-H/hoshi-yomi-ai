<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 400" preserveAspectRatio="xMidYMax slice">
  <!--
    日本画風の三重連山 (背→前)
    flat color、内部グラデなし。重ねた層と低 opacity で遠近を出す。
  -->

  <!-- 最遠景: 紫紺の霞む稜線 -->
  <path
    d="M 0,260 L 130,225 L 260,250 L 410,205 L 560,230 L 720,200 L 880,220 L 1040,205 L 1200,235 L 1370,215 L 1530,240 L 1700,215 L 1860,235 L 1920,225 L 1920,400 L 0,400 Z"
    fill="#5B3270"
    opacity="0.22"
  />

  <!-- 中景: 藍色のシルエット -->
  <path
    d="M 0,310 L 140,260 L 290,295 L 440,240 L 580,285 L 740,235 L 900,275 L 1060,250 L 1230,290 L 1390,255 L 1560,295 L 1720,260 L 1880,290 L 1920,275 L 1920,400 L 0,400 Z"
    fill="#223A5E"
    opacity="0.42"
  />

  <!-- 中景の頂稜に金箔ハイライト -->
  <path
    d="M 140,260 L 290,295 L 440,240 L 580,285 L 740,235 L 900,275 L 1060,250 L 1230,290 L 1390,255 L 1560,295 L 1720,260 L 1880,290"
    fill="none"
    stroke="#C9A84C"
    stroke-width="0.7"
    opacity="0.18"
  />

  <!-- 近景: 漆黒の力強い稜線 -->
  <path
    d="M 0,360 L 110,295 L 230,325 L 380,255 L 520,300 L 680,265 L 830,310 L 990,275 L 1150,320 L 1320,285 L 1480,325 L 1640,290 L 1800,320 L 1920,300 L 1920,400 L 0,400 Z"
    fill="#0D0D14"
    opacity="0.88"
  />

  <!-- 近景の頂稜にうっすら金箔のリム -->
  <path
    d="M 110,295 L 230,325 L 380,255 L 520,300 L 680,265 L 830,310 L 990,275 L 1150,320 L 1320,285 L 1480,325 L 1640,290 L 1800,320"
    fill="none"
    stroke="#C9A84C"
    stroke-width="0.9"
    opacity="0.32"
  />
</svg>
